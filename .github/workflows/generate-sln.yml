name: generate sln

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gen:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: generate sln
        run: cmake -S . -B build_vs2022 -G "Visual Studio 17 2022" -A x64
      - name: commit sln
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "ELF-Nigel"
          git config user.email "ELF-Nigel@users.noreply.github.com"
          git add build_vs2022/*.sln build_vs2022/*.vcxproj build_vs2022/*.vcxproj.filters
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { exit 0 }
          git commit -m "ci: update vs2022 sln"
      - name: push
        run: git push
